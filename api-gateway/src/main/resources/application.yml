server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

#            - id: product-service
#              uri: http://localhost:8082
#              predicates:
