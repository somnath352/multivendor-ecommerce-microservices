server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${SECRET_KEY}
  expiration: 900000  # 15 minutes
  refresh-expiration: 604800000  # 7-days

#eureka:
#  client:
#    service-url:
#      defaultZone: http://localhost:8761/eureka/
#    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info

